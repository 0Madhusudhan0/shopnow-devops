name: Pull Request Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'docker/**'
      - '.github/workflows/pr-checks.yml'

jobs:
  lint-test-build:
    name: Code Quality & Build Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # If package-lock.json doesn't exist yet, we write it or fall back to npm install
      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Application
        run: npm run build
