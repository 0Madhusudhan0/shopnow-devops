version: '3.8'

services:
  # Development Service: Supports hot-reloading by mounting source code
  frontend-dev:
    image: node:22-alpine
    container_name: shopnow-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Avoid overwriting node_modules inside container with host's empty directory
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"

  # Production Service: Tests the Nginx-compiled production container locally
  frontend-prod:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shopnow-frontend-prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
